name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── TypeScript SDK ─────────────────────────────────────────────────────────
  sdk-typecheck:
    name: SDK typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/core/package.json

      - name: Install SDK deps
        run: npm install
        working-directory: packages/core

      - name: tsc --noEmit
        run: npm run typecheck
        working-directory: packages/core
